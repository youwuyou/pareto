name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.4" "nbqa>=1.8" "jsonschema>=4.0"
      - name: Lint Python sources
        run: ruff check tracks/ templates/
      - name: Lint notebook cells
        run: |
          shopt -s nullglob
          for nb in tracks/*/starter.ipynb templates/submission/submission.ipynb; do
            echo "::group::$nb"
            nbqa ruff "$nb" || true   # warnings, not failures, for starter notebooks
            echo "::endgroup::"
          done

  validate-submissions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install jsonschema
        run: pip install "jsonschema>=4.0"
      - name: Validate every submissions/*/results.json against schema
        run: |
          shopt -s nullglob
          fails=0
          for f in submissions/*/results.json submissions/*/*/results.json; do
            echo "::group::$f"
            if ! python -c "import json,sys; import jsonschema; jsonschema.validate(json.load(open('$f')), json.load(open('docs/results.schema.json'))); print('ok')"; then
              fails=$((fails+1))
            fi
            echo "::endgroup::"
          done
          if [ "$fails" -gt 0 ]; then
            echo "Schema validation failed for $fails submission(s)"
            exit 1
          fi
